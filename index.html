<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAMA HR 系統入口</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:linear-gradient(135deg,#1a56db,#7c3aed);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.box{background:#fff;border-radius:24px;padding:36px 28px;width:100%;max-width:400px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.25)}
h1{font-size:22px;font-weight:800;color:#1a56db;margin-bottom:6px}
p{color:#6b7280;font-size:14px;margin-bottom:28px}
.btn{display:block;padding:16px;border-radius:14px;font-size:16px;font-weight:700;text-decoration:none;margin-bottom:12px;transition:all .2s}
.btn-hr{background:#1a56db;color:#fff}
.btn-candidate{background:#10b981;color:#fff}
.btn:active{opacity:.85;transform:scale(.98)}
.icon{font-size:48px;margin-bottom:16px}
</style>
</head>
<body>
<div class="box">
  <div class="icon">🏢</div>
  <h1>GAMA HR 系統</h1>
  <p>英屬維京群島商嘉码科技有限公司台灣分公司</p>
  <a href="admin.html" class="btn btn-hr">👔 HR 管理入口<br><small style="font-weight:400;font-size:12px">（內部人員使用）</small></a>
  <a href="candidate.html" class="btn btn-candidate">📝 面試者應試入口<br><small style="font-weight:400;font-size:12px">（應徵者填寫資料 / 測驗）</small></a>
</div>
</body>
</html>
